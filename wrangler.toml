name = "jules-telegram-cockpit"
main = "src/index.ts"
compatibility_date = "2024-03-20"

[[d1_databases]]
binding = "DB"
database_name = "jules_cockpit_db"
database_id = "your-d1-database-id-here"

[vars]
ENVIRONMENT = "production"
# TELEGRAM_BOT_TOKEN, JULES_API_KEY, TELEGRAM_SUPERGROUP_ID, and WEBHOOK_SETUP_SECRET should be set as secrets
